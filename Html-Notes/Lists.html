<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists in HTML : </title>
</head>
<body>
   
    <h4>Lists in HTML : </h4>
    <p>1. Unordered Lists </p>

    <ul>
        <li>Bread</li>
        <li>Jam</li>
        <li>Eggs</li>
    </ul>

    <p>2. Ordereed Lists </p>
    <ol>
        <li>Bread</li>
        <li>Jam</li>
        <li>Eggs</li>
    </ol>
    
    <ol type = "a">
        <li>Bread</li>
        <li>Jam</li>
        <li>Eggs</li>
    </ol>

    <ol type = "i">
        <li>Bread</li>
        <li>Jam</li>
        <li>Eggs</li>
    </ol>
