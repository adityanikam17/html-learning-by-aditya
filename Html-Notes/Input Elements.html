<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Elements </title>
</head>
<body>
    <form action="/server">
    <h4>Input Elements : </h4>
    <p>1. Checkbox :</p>

    <input type="checkbox" id="age" >
    <label for="age">I am 18+</label>
    <button>Submit</button>

    <hr>
    <br>
    <p>2. Radio :</p>

    <input type="radio" name="fruit" id="apple" value="apple">
    <label for="apple">Apple</label>
    <br>
    <input type="radio" name="fruit" id="mango" value="mango">
    <label for="mango">Mango</label>
    <br>
    <input type="radio" name="fruit" id="litchi" value="litchi">
    <label for="litchi">Litchi</label>
    <br>

    <div>
        Choose your Subjects:<br>
        <input type="radio" name="subjects1" id="math" value="math">
        <label for="math">Maths</label> <br>

        <input type="radio" name="subjects2" id="science" value="science">
        <label for="science">Science</label><br>

        <input type="radio" name="subjects3" id="english" value="english">
        <label for="english">English</label>
    </div>

    <button>Submit</button>

    <hr>
    <br>

    <p>3. Select : (dropdown)</p>
    <div>
        Choose your profession:<br>
        <select name="profession" id="profession">
            <option>Select your option</option>
            <option value="stud">Student</option>
            <option value="dev">Developer</option>
        </select>
    </div>

    <hr>
    <br>
    <p>4. Range : </p>
    <label for="vol">Choose your level : </label>
    <input type="range" id="vol" >
    <button>Submit</button>
    <br> 
    <label for="vol">Choose your level : </label>
    <input type="range" id="vol" min="0" max="100" name="vol" step="10" >
    <button>Submit</button>

    <hr>
    <br>
    <p>5. Text Area : </p>
    <label for="feedback">Please give your feedback :</label>
    <textarea id="feedback" name="feedback" ></textarea>
    <button>Submit</button>
    <br>
    <label for="feedback">Please give your feedback :</label>
    <textarea id="feedback" name="feedback" rows="5" cols="15"></textarea>
    <button>Submit</button>
    <br>
    <label for="feedback">Please give your feedback :</label>
    <textarea id="feedback" name="feedback" placeholder="Write your Feedback here!!"></textarea>
    <button>Submit</button>

    <hr>
    <br>
    <h3>Practice question 9 : Registration form </h3>
    <div>
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name">
    </div>
    <br>
    <div>
        <label for="gender">Please select your gender:</label>
        <select name="gender" id="gender">
            <option value="m">Male</option>
            <option value="f">Female</option>
            <option value="o">Other</option>
        </select>
    </div>
    <br>
    <div>
         Do you agree terms of Service?
         <input type="checkbox" id="agree" name="agree">
         <label for="agree">Yes, I agree</label>
    </div>
    <br>
    <button>Register</button>
    </form>
</body>
</html>
