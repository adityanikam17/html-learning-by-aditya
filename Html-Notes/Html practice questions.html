        <!DOCTYPE html>

    <title>Feedback Form</title>
</head>
<body>

    <h2>Feedback Form</h2>

    <form action="/contact">

        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Write your name">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Write your email">
        <br><br>

        <label for="message">Message:</label>
        <br>
        <textarea name="message" id="message" cols="30" rows="4"></textarea>
        <br><br>

        <label>Rate us out of 5:</label>
        <br>

        <input type="radio" name="rating" id="one" value="1">
        <label for="one">1</label>
        <br>

        <input type="radio" name="rating" id="two" value="2">
        <label for="two">2</label>
        <br>

        <input type="radio" name="rating" id="three" value="3">
        <label for="three">3</label>
        <br>

        <input type="radio" name="rating" id="four" value="4">
        <label for="four">4</label>
        <br>

        <input type="radio" name="rating" id="five" value="5">
        <label for="five">5</label>
        <br><br>

        <button type="submit">Send your message!</button>

    </form>

</body>
</html>
