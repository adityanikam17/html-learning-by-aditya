<p><h4>Span Element : </h4> Span is also a generic container used to hold another HTML elements or group elements together. Span is an Inline Element.</p>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <span>
    <a href="https://www.youtube.com/"> YouTube </a>
    <a href="https://chatgpt.com/"> ChatGpt </a>
    </span>

    <a href="https://gemini.google.com/app?hl=en-IN"> Gemini </a>

</body>
</html>
